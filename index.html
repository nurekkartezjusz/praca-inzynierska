    <script>
        const API_URL = '/api';

        // Sprawdź czy użytkownik jest zalogowany
        async function checkAuth() {
            const token = localStorage.getItem('access_token');
            const email = localStorage.getItem('user_email');

            if (!token || !email) {
                // Nie zalogowany - przekieruj do logowania
                window.location.href = 'logowanie/index.html';
                return;
            }

            try {
                // Sprawdź czy token jest ważny
                const response = await fetch(`${API_URL}/me?token=${token}`);
                
                if (response.ok) {
                    // Sprawdź czy odpowiedź ma treść przed parsowaniem JSON
                    let userData;
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        const text = await response.text();
                        if (text) {
                            userData = JSON.parse(text);
                        } else {
                            userData = {};
                        }
                    } else {
                        userData = {};
                    }
                    
                    // Sprawdź czy użytkownik ma awatar - jeśli nie, przekieruj do kreatora
                    if (!userData.avatar) {
                        window.location.href = 'wybor awatara/index.html?new=true';
                        return;
                    }
                    
                    // Zalogowany - pokaż profil
                    document.getElementById('user-profile').classList.add('logged-in');
                    document.getElementById('profile-email').textContent = userData.email;
                    
                    // Ustaw inicjał użytkownika
                    const initial = userData.username ? userData.username[0].toUpperCase() : userData.email[0].toUpperCase();
                    document.getElementById('profile-icon').textContent = initial;
                } else {
                    // Token nieważny - przekieruj do logowania
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user_email');
                    window.location.href = 'logowanie/index.html';
                }
            } catch (error) {
                console.error('Błąd sprawdzania autoryzacji:', error);
                // Błąd - przekieruj do logowania
                localStorage.removeItem('access_token');
                localStorage.removeItem('user_email');
                window.location.href = 'logowanie/index.html';
            }
        }

        // Toggle menu
        function toggleMenu() {
            const menu = document.getElementById('profile-menu');
            menu.classList.toggle('show');
        }

        // Zamknij menu po kliknięciu poza nim
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('profile-menu');
            const profile = document.getElementById('user-profile');
            if (!profile.contains(e.target) && menu.classList.contains('show')) {
                menu.classList.remove('show');
            }
        });

        // Wyloguj
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_email');
            window.location.reload();
        }

        // Sprawdź autoryzację przy załadowaniu strony
        checkAuth();
    </script>
</body>
